<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub</title>
  <style>
    :root {
      --bg1: #f7f4ea;
      --bg2: #e7efe8;
      --card: #fffdf8;
      --ink: #2a2a2a;
      --accent: #c66a0a;
      --line: #d8cfbe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(960px, 100%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 0.5px;
    }

    .sub {
      margin: 0 0 20px;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(33, 33, 33, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card h2 {
      margin: 0;
      font-size: 22px;
    }

    .card p {
      margin: 0;
      line-height: 1.5;
      opacity: 0.86;
    }

    .btn {
      margin-top: 4px;
      width: fit-content;
      text-decoration: none;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      transition: transform .16s ease, filter .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn.secondary {
      background: #4f6d7a;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Game Hub</h1>
    <p class="sub">Choose a game to start playing.</p>

    <section class="grid">
      <article class="card">
        <h2>Snake Game</h2>
        <p>Classic snake gameplay in your browser. Use arrow keys or WASD.</p>
        <a class="btn" href="./snake.html">Play Snake</a>
      </article>

      <article class="card">
        <h2>Roblox</h2>
        <p>Jump to Roblox official website in a new tab.</p>
        <a class="btn secondary" href="https://www.roblox.com" target="_blank" rel="noopener noreferrer">Open Roblox</a>
      </article>
    </section>
  </main>
</body>
</html>
